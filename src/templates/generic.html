<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #fff;
      padding: 4mm;
    }

    .header {
      border-bottom: 2px solid #1a237e;
      padding-bottom: 10px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a237e;
    }

    .body-content {
      white-space: pre-wrap;
      line-height: 1.7;
      color: #333;
      border: 1px solid #e8eaf6;
      border-radius: 4px;
      padding: 12px 16px;
      background: #f7f8fd;
      margin-bottom: 24px;
    }

    .footer {
      border-top: 1px solid #dde1f0;
      padding-top: 6px;
      font-size: 9px;
      color: #999;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>{{title}}</h1>
  </div>

  <div class="body-content">{{body}}</div>

  <div class="footer">
    <span>Generated by tallyca</span>
    <span>{{generatedAt}}</span>
  </div>

</body>
</html>
